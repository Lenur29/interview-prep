services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-prep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: interview_prep
      POSTGRES_PASSWORD: interview_prep_dev
      POSTGRES_DB: interview_prep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_prep -d interview_prep"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: interview-prep-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
