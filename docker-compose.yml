services:
  postgres:
    image: postgres:16-alpine
    container_name: lemur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lemur
      POSTGRES_PASSWORD: lemur_dev
      POSTGRES_DB: lemur
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lemur -d lemur"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: lemur-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
