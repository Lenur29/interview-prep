# ============== App ===============
PORT: 6700
APP_ENV: local

LEMUR_APP_URL: https://app.lemurjs.local

# ============== Postgres ===============

POSTGRES_HOST: localhost
POSTGRES_PORT: 6720
POSTGRES_USER: root
POSTGRES_PASS: root
POSTGRES_DB: app

# ============== S3 (MinIO via infra/local/up.sh) ===============

AWS_S3_PROVIDER: minio
AWS_S3_ENDPOINT: http://localhost:9000
AWS_S3_REGION: us-east-1
AWS_S3_FORCE_PATH_STYLE: true
AWS_S3_BUCKET: lemurjs-uploads
AWS_S3_PRIVATE_BUCKET: lemurjs-private
AWS_S3_ACCESS_KEY_ID: minioadmin
AWS_S3_SECRET_ACCESS_KEY: minioadmin
