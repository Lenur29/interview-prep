name: lemurjs

services:
  postgres:
    image: postgres:16-alpine
    container_name: lemurjs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: app
    ports:
      - "6720:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
    name: lemurjs-postgres-data
